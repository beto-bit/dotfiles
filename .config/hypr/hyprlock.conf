# BACKGROUND
background {
    monitor =
    path = ~/Pictures/Wallpapers/archy-dsotm_edited.png
    blur_passes = 1
    contrast = 0.8916
    brightness = 0.1696
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    no_fade_out = false
    grace = 0
    disable_loading_bar = false
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 3
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = JetBrains Mono Nerd Font Mono
    placeholder_text = <i>Input Password...</i>
    hide_input = false

    check_color = rgb(204, 136, 34)

    fail_color = rgb(204, 34, 34)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 60

    capslock_color = rgb(206, 223, 96)
    numlock_color = rgb(206, 223, 96)
    invert_numlock = true

    position = 0, -100
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = Hi there, $USER
    color = $foreground
    font_size = 25
    font_family = JetBrains Mono Nerd Font Mono
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(cat /sys/class/power_supply/BAT0/capacity)% 󱐋 "
    color = $foreground
    font_size = 25
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, -650
    halign = center
    valign = top
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M%p")"
    color = $foreground
    font_size = 120
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, -100
    halign = center
    valign = top
}

